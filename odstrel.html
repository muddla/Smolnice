<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Smolnická výsypka</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

.compare {
    position: relative;
    width: 100%;
    max-width: 2000px;
    margin: 20px auto;
    overflow: hidden;
    cursor: ew-resize;
}

/* spodní obrázek */
.current img {
    display: block;
    width: 100%;
    height: auto;
}


/* horní ořezová vrstva */
.old {
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
}

/* pevné plátno historického obrázku */
.old-inner {
    position: absolute;
    top: 0;
    left: 0;
}

.old-inner img {
    display: block;
    width: 100%;
    height: 100%;
}


/* dělicí čára */
.slider {
    position: absolute;
    top: 0;
    left: 50%;
    width: 3px;
    height: 100%;
    background: white;
    box-shadow: 0 0 5px black;
}

.handle {
    position: absolute;
    top: 50%;
    left: -7px;
    width: 14px;
    height: 14px;
    margin-top: -7px;
    border-radius: 50%;
    background: white;
    border: 2px solid #555;
}

.labels {
    max-width: 2000px;
    margin: 8px auto;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}
</style>

</head>
