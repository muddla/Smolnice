<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Smolnická výsypka</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
	<!-- background-image: url('background.jpg');-->
}

.compare {
    position: relative;
    width: 100%;
    max-width: 2000px;
    margin: 20px auto;
    overflow: hidden;
    cursor: ew-resize;
	width: 100%; max-width: 1000px; height: auto; display: block; margin: 0 auto;
}

/* spodní obrázek */
.current img {
    display: block;
    width: 100%;
    height: auto;
}


/* horní ořezová vrstva */
.old {
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
}

/* pevné plátno historického obrázku */
.old-inner {
    position: absolute;
    top: 0;
    left: 0;
}

.old-inner img {
    display: block;
    width: 100%;
    height: 100%;
}


/* dělicí čára */
.slider {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1px;
    height: 100%;
    background: white;
    box-shadow: 0 0 0px black;
}

.handle {
    position: absolute;
    top: 50%;
    left: -4px;
    width: 8px;
    height: 8px;
    margin-top: -4px;
    border-radius: 50%;
    background: white;
    border: 0px solid #555;
}

.labels {
    max-width: 2000px;
    margin: 8px auto;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}
</style>

</head>

<body>
<p style="text-align:center; font-size:120%;">GCBT8M2 Smolnická výsypka</p>


<div><span style="text-align:center;">

<br/> <br/>
<p style="text-align:center; font-size:110%;">Proměny krajiny pohledem shora</p>
<p style="text-align:center; font-size:100%;">Použijte posuvník</p>

</span>

<div class="compare" id="compare">

    <!-- současný stav -->
    <div class="current">
        <img id="currentImage" src="mapa_01.jpg" alt="Současný stav">
    </div>


    <!-- historický stav -->
    <div class="old" id="old">
        <div class="old-inner" id="oldInner">
            <img src="mapa_00.jpg" alt="Historický stav">
        </div>
    </div>


    <!-- posuvník -->
    <div class="slider" id="slider">
        <div class="handle"></div>
    </div>

</div>

<img src="key.jpg" alt="(vlastní foto)" style="width: 350px; height: 455px; display: block; margin: 0 auto;"  onclick="window.close()"><br/>
<script>

const compare = document.getElementById("compare");
const old = document.getElementById("old");
const oldInner = document.getElementById("oldInner");
const slider = document.getElementById("slider");
const currentImage = document.getElementById("currentImage");


/*
 Nastaví historický obrázek na stejné plátno,
 jako má celý porovnávací prostor.
*/
function resizeCanvas() {

    const width = compare.clientWidth;
    const height = compare.clientHeight;

    oldInner.style.width = width + "px";
    oldInner.style.height = height + "px";
}


currentImage.onload = resizeCanvas;

window.addEventListener("resize", resizeCanvas);



function moveSlider(x) {

    const rect = compare.getBoundingClientRect();

    let pos = x - rect.left;

    if (pos < 0) pos = 0;
    if (pos > rect.width) pos = rect.width;

    const percent = (pos / rect.width) * 100;

    old.style.width = percent + "%";
    slider.style.left = percent + "%";
}


/* myš */
compare.addEventListener("mousemove", function(e) {
    moveSlider(e.clientX);
});


/* dotyk */
compare.addEventListener("touchmove", function(e) {
    moveSlider(e.touches[0].clientX);
});

</script>
